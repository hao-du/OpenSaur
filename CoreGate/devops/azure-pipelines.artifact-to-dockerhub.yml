parameters:
  - name: buildConfiguration
    type: string
  - name: dotnetSdkVersion
    type: string
  - name: nodeVersion
    type: string
  - name: clientWorkingDirectory
    type: string
  - name: webProject
    type: string
  - name: publishOutputDirectory
    type: string
  - name: dockerfileTemplate
    type: string
  - name: dockerHubServiceConnection
    type: string
  - name: dockerRepository
    type: string

stages:
  - stage: PublishDocker
    displayName: Publish Docker Image To Docker Hub
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PublishImage
        displayName: Build And Push Docker Image
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: ${{ parameters.dotnetSdkVersion }}

          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: ${{ parameters.nodeVersion }}

          - task: Npm@1
            displayName: Install frontend dependencies
            inputs:
              command: install
              workingDir: ${{ parameters.clientWorkingDirectory }}

          - task: Npm@1
            displayName: Build frontend
            inputs:
              command: custom
              workingDir: ${{ parameters.clientWorkingDirectory }}
              customCommand: run build

          - task: DotNetCoreCLI@2
            displayName: Restore web application dependencies
            inputs:
              command: restore
              projects: ${{ parameters.webProject }}
              feedsToUse: select

          - task: DotNetCoreCLI@2
            displayName: Publish web application
            inputs:
              command: publish
              publishWebProjects: false
              projects: ${{ parameters.webProject }}
              arguments: --configuration ${{ parameters.buildConfiguration }} --output ${{ parameters.publishOutputDirectory }} --no-restore /p:CompressionEnabled=false
              zipAfterPublish: false
              modifyOutputPath: false

          - script: cp "${{ parameters.dockerfileTemplate }}" "${{ parameters.publishOutputDirectory }}/Dockerfile.artifact"
            displayName: Copy Dockerfile into publish context

          - script: cp "CoreGate/devops/container-entrypoint.sh" "${{ parameters.publishOutputDirectory }}/container-entrypoint.sh"
            displayName: Copy container entrypoint into publish context

          - task: Docker@2
            displayName: Build and push Docker image
            inputs:
              command: buildAndPush
              containerRegistry: ${{ parameters.dockerHubServiceConnection }}
              repository: ${{ parameters.dockerRepository }}
              Dockerfile: ${{ parameters.publishOutputDirectory }}/Dockerfile.artifact
              buildContext: ${{ parameters.publishOutputDirectory }}
              tags: |
                $(Build.BuildId)

          - bash: |
              set -euo pipefail

              IMAGE_REFERENCE="${{ parameters.dockerRepository }}:$(Build.BuildId)"

              echo "Published image: $IMAGE_REFERENCE"
              echo "##vso[task.setvariable variable=imageReference;isOutput=true]$IMAGE_REFERENCE"
            displayName: Set published image reference
            name: setImageReference
