parameters:
  - name: azureServiceConnection
    type: string
    default: Azure Service Connection
  - name: storageAccountName
    type: string
    default: cashpilot
  - name: storageContainerName
    type: string
    default: $web
  - name: siteOutputDirectory
    type: string
    default: CashPilot/src/OpenSaur.CashPilot.Web/wwwroot
  - name: frontendArtifactName
    type: string
    default: frontend-wwwroot

stages:
  - stage: PublishStaticWeb
    displayName: Publish Static Web
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PublishStaticWeb
        displayName: Build And Publish Static Web Bundle
        steps:
          - checkout: self
            clean: true

          - task: DownloadPipelineArtifact@2
            displayName: Download frontend build artifact
            inputs:
              artifact: ${{ parameters.frontendArtifactName }}
              targetPath: ${{ parameters.siteOutputDirectory }}

          - task: AzureCLI@2
            displayName: Sync static site to $web
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                az storage blob sync \
                  --account-name "${{ parameters.storageAccountName }}" \
                  --auth-mode login \
                  --container '${{ parameters.storageContainerName }}' \
                  --delete-destination true \
                  --source "${{ parameters.siteOutputDirectory }}"
