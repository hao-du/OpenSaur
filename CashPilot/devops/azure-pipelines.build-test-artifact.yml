parameters:
  - name: buildConfiguration
    type: string
  - name: dotnetSdkVersion
    type: string
  - name: nodeVersion
    type: string
  - name: webProject
    type: string
  - name: clientWorkingDirectory
    type: string
  - name: siteOutputDirectory
    type: string
    default: CashPilot/src/OpenSaur.CashPilot.Web/wwwroot
  - name: frontendArtifactName
    type: string
    default: frontend-wwwroot
  - name: frontendOfflineArtifactName
    type: string
    default: frontend-wwwroot-offline

stages:
  - stage: Build
    displayName: Build FE And BE
    jobs:
      - job: BackendBuild
        displayName: Build Backend
        steps:
          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: ${{ parameters.dotnetSdkVersion }}

          - task: DotNetCoreCLI@2
            displayName: 'Restore backend dependencies'
            inputs:
              command: 'restore'
              projects: '${{ parameters.webProject }}'
              feedsToUse: 'select'

          - task: DotNetCoreCLI@2
            displayName: 'Build backend'
            inputs:
              command: 'build'
              projects: '${{ parameters.webProject }}'
              arguments: '--configuration ${{ parameters.buildConfiguration }} --no-restore'

      - job: FrontendBuild
        displayName: Build Frontend
        steps:
          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: ${{ parameters.nodeVersion }}

          - task: Npm@1
            displayName: Install frontend dependencies
            inputs:
              command: install
              workingDir: ${{ parameters.clientWorkingDirectory }}

          - task: Npm@1
            displayName: Build frontend
            inputs:
              command: custom
              workingDir: ${{ parameters.clientWorkingDirectory }}
              customCommand: run build

          - task: PublishPipelineArtifact@1
            displayName: Publish frontend build artifact
            inputs:
              targetPath: ${{ parameters.siteOutputDirectory }}
              artifact: ${{ parameters.frontendArtifactName }}

      - job: FrontendOfflineBuild
        displayName: Build Offline Frontend
        steps:
          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: ${{ parameters.nodeVersion }}

          - task: Npm@1
            displayName: Install frontend dependencies
            inputs:
              command: install
              workingDir: ${{ parameters.clientWorkingDirectory }}

          - task: Npm@1
            displayName: Build offline frontend
            inputs:
              command: custom
              workingDir: ${{ parameters.clientWorkingDirectory }}
              customCommand: run build-prod-offline

          - task: PublishPipelineArtifact@1
            displayName: Publish offline frontend build artifact
            inputs:
              targetPath: ${{ parameters.siteOutputDirectory }}
              artifact: ${{ parameters.frontendOfflineArtifactName }}
