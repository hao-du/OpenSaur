trigger: none
pr: none

parameters:
  - name: imageReference
    displayName: Optional full image reference override
    type: string
    default: ''
  - name: sourceContainerizeRunId
    displayName: Optional container pipeline run ID
    type: string
    default: ''

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: REPLACE_WITH_AZURE_SERVICE_CONNECTION
  sourceProject: REPLACE_WITH_AZURE_DEVOPS_PROJECT_NAME
  sourcePipelineDefinitionId: REPLACE_WITH_CONTAINER_PIPELINE_DEFINITION_ID
  sourceBranchRef: refs/heads/main
  imageMetadataArtifactName: docker-image-metadata
  imageMetadataDownloadPath: $(Pipeline.Workspace)/docker-image-metadata
  imageMetadataFile: $(Pipeline.Workspace)/docker-image-metadata/image-reference.txt
  containerAppResourceGroup: REPLACE_WITH_CONTAINER_APP_RESOURCE_GROUP
  containerAppName: REPLACE_WITH_CONTAINER_APP_NAME

stages:
  - stage: DeployToAzureContainerApps
    displayName: Update Existing Azure Container App
    jobs:
      - job: Deploy
        displayName: Deploy Docker Hub Image To ACA
        steps:
          - checkout: none

          - task: DownloadPipelineArtifact@2
            displayName: Download image metadata by specific run
            condition: and(eq('${{ parameters.imageReference }}', ''), ne('${{ parameters.sourceContainerizeRunId }}', ''))
            inputs:
              buildType: specific
              project: $(sourceProject)
              definition: $(sourcePipelineDefinitionId)
              buildVersionToDownload: specific
              pipelineId: ${{ parameters.sourceContainerizeRunId }}
              artifactName: $(imageMetadataArtifactName)
              targetPath: $(imageMetadataDownloadPath)

          - task: DownloadPipelineArtifact@2
            displayName: Download latest image metadata from main
            condition: and(eq('${{ parameters.imageReference }}', ''), eq('${{ parameters.sourceContainerizeRunId }}', ''))
            inputs:
              buildType: specific
              project: $(sourceProject)
              definition: $(sourcePipelineDefinitionId)
              buildVersionToDownload: latestFromBranch
              branchName: $(sourceBranchRef)
              artifactName: $(imageMetadataArtifactName)
              targetPath: $(imageMetadataDownloadPath)

          - bash: |
              set -euo pipefail

              if [ -n "${{ parameters.imageReference }}" ]; then
                RESOLVED_IMAGE='${{ parameters.imageReference }}'
              else
                RESOLVED_IMAGE="$(tr -d '\r\n' < '$(imageMetadataFile)')"
              fi

              if [ -z "$RESOLVED_IMAGE" ]; then
                echo "Resolved image reference is empty."
                exit 1
              fi

              echo "Deploying image: $RESOLVED_IMAGE"
              echo "##vso[task.setvariable variable=resolvedImageReference]$RESOLVED_IMAGE"
            displayName: Resolve image reference

          - task: AzureCLI@2
            displayName: Update Azure Container App image
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                az containerapp update \
                  --name "$(containerAppName)" \
                  --resource-group "$(containerAppResourceGroup)" \
                  --image "$(resolvedImageReference)"
