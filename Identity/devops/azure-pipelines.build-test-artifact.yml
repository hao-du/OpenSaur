trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  dotnetSdkVersion: 10.0.x
  nodeVersion: 20.x
  solutionPath: src/OpenSaur.Identity.Web.slnx
  backendTestProject: src/OpenSaur.Identity.Web.Tests/OpenSaur.Identity.Web.Tests.csproj
  webProject: src/OpenSaur.Identity.Web/OpenSaur.Identity.Web.csproj
  clientWorkingDirectory: src/OpenSaur.Identity.Web/client
  publishOutputDirectory: $(Build.ArtifactStagingDirectory)/webapp-publish
  publishArtifactName: webapp-publish

stages:
  - stage: BuildTestAndPublish
    displayName: Build, Test, And Publish Artifact
    jobs:
      - job: BuildTestPublish
        displayName: Build, Run Unit Tests, And Publish
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: $(dotnetSdkVersion)

          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: $(nodeVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore backend dependencies
            inputs:
              command: restore
              projects: $(solutionPath)

          - task: DotNetCoreCLI@2
            displayName: Build backend
            inputs:
              command: build
              projects: $(solutionPath)
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: DotNetCoreCLI@2
            displayName: Run backend unit tests
            inputs:
              command: test
              projects: $(backendTestProject)
              arguments: --configuration $(buildConfiguration) --no-restore --no-build
              publishTestResults: true

          - task: Npm@1
            displayName: Install frontend dependencies
            inputs:
              command: install
              workingDir: $(clientWorkingDirectory)

          - task: Npm@1
            displayName: Run frontend unit tests
            inputs:
              command: custom
              workingDir: $(clientWorkingDirectory)
              customCommand: run test -- --run

          - task: Npm@1
            displayName: Build frontend
            inputs:
              command: custom
              workingDir: $(clientWorkingDirectory)
              customCommand: run build

          - task: DotNetCoreCLI@2
            displayName: Publish web application artifact
            inputs:
              command: publish
              publishWebProjects: false
              projects: $(webProject)
              arguments: --configuration $(buildConfiguration) --output $(publishOutputDirectory) /p:CompressionEnabled=false
              zipAfterPublish: false
              modifyOutputPath: false

          - task: PublishPipelineArtifact@1
            displayName: Publish web application artifact
            inputs:
              targetPath: $(publishOutputDirectory)
              artifact: $(publishArtifactName)
              publishLocation: pipeline
