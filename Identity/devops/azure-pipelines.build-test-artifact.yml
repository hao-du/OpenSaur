trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  dotnetSdkVersion: 10.0.x
  nodeVersion: 20.x
  backendTestProject: src/OpenSaur.Identity.Web.Tests/OpenSaur.Identity.Web.Tests.csproj
  backendTestResultsDirectory: $(Agent.TempDirectory)/backend-test-results
  webProject: src/OpenSaur.Identity.Web/OpenSaur.Identity.Web.csproj
  clientWorkingDirectory: src/OpenSaur.Identity.Web/client
  publishOutputDirectory: $(Build.ArtifactStagingDirectory)/webapp-publish
  publishArtifactName: webapp-publish

stages:
  - stage: BuildTestAndPublish
    displayName: Build, Test, And Publish Artifact
    jobs:
      - job: BuildTestPublish
        displayName: Build, Run Unit Tests, And Publish
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: $(dotnetSdkVersion)

          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: $(nodeVersion)

          - bash: |
              set -euo pipefail
              echo "Repository root: $(Build.SourcesDirectory)"
              test -f "$(webProject)"
              test -f "$(backendTestProject)"
            displayName: Verify backend project paths

          - bash: |
              set -euo pipefail
              dotnet restore "$(webProject)"
              dotnet restore "$(backendTestProject)"
            displayName: Restore backend dependencies

          - bash: |
              set -euo pipefail
              dotnet build "$(webProject)" --configuration "$(buildConfiguration)" --no-restore
              dotnet build "$(backendTestProject)" --configuration "$(buildConfiguration)" --no-restore
            displayName: Build backend

          - bash: |
              set -euo pipefail
              mkdir -p "$(backendTestResultsDirectory)"
              dotnet test "$(backendTestProject)" \
                --configuration "$(buildConfiguration)" \
                --no-restore \
                --no-build \
                --logger "trx;LogFileName=backend-tests.trx" \
                --results-directory "$(backendTestResultsDirectory)"
            displayName: Run backend unit tests

          - task: PublishTestResults@2
            displayName: Publish backend test results
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: $(backendTestResultsDirectory)/*.trx
              failTaskOnFailedTests: true
              testRunTitle: Backend unit tests

          - task: Npm@1
            displayName: Install frontend dependencies
            inputs:
              command: install
              workingDir: $(clientWorkingDirectory)

          - task: Npm@1
            displayName: Run frontend unit tests
            inputs:
              command: custom
              workingDir: $(clientWorkingDirectory)
              customCommand: run test -- --run

          - task: Npm@1
            displayName: Build frontend
            inputs:
              command: custom
              workingDir: $(clientWorkingDirectory)
              customCommand: run build

          - bash: |
              set -euo pipefail
              dotnet publish "$(webProject)" \
                --configuration "$(buildConfiguration)" \
                --output "$(publishOutputDirectory)" \
                /p:CompressionEnabled=false
            displayName: Publish web application artifact

          - task: PublishPipelineArtifact@1
            displayName: Publish web application artifact
            inputs:
              targetPath: $(publishOutputDirectory)
              artifact: $(publishArtifactName)
              publishLocation: pipeline
