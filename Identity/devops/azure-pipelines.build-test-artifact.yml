trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  dotnetSdkVersion: 10.0.x
  nodeVersion: 20.x
  projectRoot: Identity
  backendTestProject: Identity/src/OpenSaur.Identity.Web.Tests/OpenSaur.Identity.Web.Tests.csproj
  backendTestResultsDirectory: $(Agent.TempDirectory)/backend-test-results
  webProject: Identity/src/OpenSaur.Identity.Web/OpenSaur.Identity.Web.csproj
  clientWorkingDirectory: Identity/src/OpenSaur.Identity.Web/client
  publishOutputDirectory: $(Build.ArtifactStagingDirectory)/webapp-publish
  publishArtifactName: webapp-publish

stages:
  - stage: BuildTestAndPublish
    displayName: Build, Test, And Publish Artifact
    jobs:
      - job: BuildTestPublish
        displayName: Build, Run Unit Tests, And Publish
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: $(dotnetSdkVersion)

          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: $(nodeVersion)

          - task: DotNetCoreCLI@2
            displayName: 'Restore backend dependencies'
            inputs:
              command: 'restore'
              projects: |
                $(webProject)
                $(backendTestProject)
              feedsToUse: 'select'

          - task: DotNetCoreCLI@2
            displayName: 'Build backend'
            inputs:
              command: 'build'
              projects: |
                $(webProject)
                $(backendTestProject)
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run backend unit tests'
            inputs:
              command: 'test'
              projects: '$(backendTestProject)'
              arguments: >
                --configuration $(buildConfiguration)
                --no-restore
                --no-build
                --logger "console;verbosity=normal"
              publishTestResults: false

          - task: PublishTestResults@2
            displayName: Publish backend test results
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: $(backendTestResultsDirectory)/*.trx
              failTaskOnFailedTests: true
              testRunTitle: Backend unit tests

          - task: Npm@1
            displayName: Install frontend dependencies
            inputs:
              command: install
              workingDir: $(clientWorkingDirectory)

          - task: Npm@1
            displayName: Run frontend unit tests
            inputs:
              command: custom
              workingDir: $(clientWorkingDirectory)
              customCommand: run test -- --run

          - task: Npm@1
            displayName: Build frontend
            inputs:
              command: custom
              workingDir: $(clientWorkingDirectory)
              customCommand: run build

          - bash: |
              set -euo pipefail
              dotnet publish "$(webProject)" \
                --configuration "$(buildConfiguration)" \
                --output "$(publishOutputDirectory)" \
                /p:CompressionEnabled=false
            displayName: Publish web application artifact

          - task: PublishPipelineArtifact@1
            displayName: Publish web application artifact
            inputs:
              targetPath: $(publishOutputDirectory)
              artifact: $(publishArtifactName)
              publishLocation: pipeline
