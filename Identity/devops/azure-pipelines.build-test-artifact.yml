trigger:
  branches:
    include:
      - main

parameters:
  - name: runBackendTests
    displayName: Run backend tests
    type: boolean
    default: true
  - name: runFrontendTests
    displayName: Run frontend tests
    type: boolean
    default: true

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  dotnetSdkVersion: 10.0.x
  nodeVersion: 20.x
  projectRoot: Identity
  backendTestProject: Identity/src/OpenSaur.Identity.Web.Tests/OpenSaur.Identity.Web.Tests.csproj
  backendTestResultsDirectory: $(Agent.TempDirectory)/backend-test-results
  webProject: Identity/src/OpenSaur.Identity.Web/OpenSaur.Identity.Web.csproj
  clientWorkingDirectory: Identity/src/OpenSaur.Identity.Web/client
  publishOutputDirectory: $(Build.ArtifactStagingDirectory)/webapp-publish
  publishArtifactName: webapp-publish

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: BackendBuild
        displayName: Build Backend
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: $(dotnetSdkVersion)

          - task: DotNetCoreCLI@2
            displayName: 'Restore backend dependencies'
            inputs:
              command: 'restore'
              projects: |
                $(webProject)
                $(backendTestProject)
              feedsToUse: 'select'

          - task: DotNetCoreCLI@2
            displayName: 'Build backend'
            inputs:
              command: 'build'
              projects: |
                $(webProject)
                $(backendTestProject)
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - ${{ if eq(parameters.runBackendTests, true) }}:
              - task: DotNetCoreCLI@2
                displayName: 'Run backend unit tests'
                inputs:
                  command: 'test'
                  projects: '$(backendTestProject)'
                  arguments: >
                    --configuration $(buildConfiguration)
                    --no-restore
                    --no-build
                    --logger "console;verbosity=normal"
                  publishTestResults: false

              - task: PublishTestResults@2
                displayName: Publish backend test results
                inputs:
                  testResultsFormat: VSTest
                  testResultsFiles: $(backendTestResultsDirectory)/*.trx
                  failTaskOnFailedTests: true
                  testRunTitle: Backend unit tests

      - job: FrontendBuild
        displayName: Build Frontend
        steps:
          - checkout: self
            clean: true

          - task: UseNode@1
            displayName: Install Node.js
            inputs:
              version: $(nodeVersion)

          - task: Npm@1
            displayName: Install frontend dependencies
            inputs:
              command: install
              workingDir: $(clientWorkingDirectory)

          - ${{ if eq(parameters.runFrontendTests, true) }}:
              - task: Npm@1
                displayName: Run frontend unit tests
                inputs:
                  command: custom
                  workingDir: $(clientWorkingDirectory)
                  customCommand: run test -- --run

          - task: Npm@1
            displayName: Build frontend
            inputs:
              command: custom
              workingDir: $(clientWorkingDirectory)
              customCommand: run build

  - stage: Publish
    displayName: Publish Artifact
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: Publish
        displayName: Publish Application
        steps:
          - checkout: self
            clean: true

          - task: DotNetCoreCLI@2
            displayName: Publish web application
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(webProject)'
              arguments: '--configuration $(buildConfiguration) --output $(publishOutputDirectory) /p:CompressionEnabled=false'
              zipAfterPublish: false
              modifyOutputPath: false

          - task: PublishPipelineArtifact@1
            displayName: Publish to artifact
            inputs:
              targetPath: $(publishOutputDirectory)
              artifact: $(publishArtifactName)
              publishLocation: pipeline
