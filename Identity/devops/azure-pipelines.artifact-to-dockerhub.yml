trigger: none
pr: none

parameters:
  - name: sourceBuildRunId
    displayName: Optional build pipeline run ID
    type: string
    default: ''

pool:
  vmImage: ubuntu-latest

variables:
  # ⚠️ ONLY these four variables need to be replaced!
  dockerHubServiceConnection: REPLACE_WITH_DOCKER_HUB_SERVICE_CONNECTION
  sourceProject: REPLACE_WITH_AZURE_DEVOPS_PROJECT_NAME
  sourcePipelineDefinitionId: REPLACE_WITH_BUILD_PIPELINE_DEFINITION_ID
  dockerRepository: REPLACE_WITH_DOCKERHUB_NAMESPACE/REPLACE_WITH_IMAGE_NAME

stages:
  - stage: ContainerizeAndPublish
    displayName: Containerize Artifact And Publish To Docker Hub
    jobs:
      - job: Dockerize
        displayName: Build And Push Docker Image
        steps:
          - checkout: self
            clean: true

          - task: DownloadPipelineArtifact@2
            displayName: Download published app artifact by specific run
            condition: ne('${{ parameters.sourceBuildRunId }}', '')
            inputs:
              buildType: specific
              project: $(sourceProject)
              definition: $(sourcePipelineDefinitionId)
              buildVersionToDownload: specific
              pipelineId: ${{ parameters.sourceBuildRunId }}
              artifactName: webapp-publish
              targetPath: $(Pipeline.Workspace)/published-app

          - task: DownloadPipelineArtifact@2
            displayName: Download latest published app artifact from main
            condition: eq('${{ parameters.sourceBuildRunId }}', '')
            inputs:
              buildType: specific
              project: $(sourceProject)
              definition: $(sourcePipelineDefinitionId)
              buildVersionToDownload: latestFromBranch
              branchName: refs/heads/main
              artifactName: webapp-publish
              targetPath: $(Pipeline.Workspace)/published-app

          - script: cp "$(Build.SourcesDirectory)/Identity/devops/Dockerfile.artifact" "$(Pipeline.Workspace)/published-app/Dockerfile.artifact"
            displayName: Copy Dockerfile into artifact context

          - task: Docker@2
            displayName: Build and push Docker image
            inputs:
              command: buildAndPush
              containerRegistry: $(dockerHubServiceConnection)
              repository: $(dockerRepository)
              Dockerfile: $(Pipeline.Workspace)/published-app/Dockerfile.artifact
              buildContext: $(Pipeline.Workspace)/published-app
              tags: |
                $(Build.BuildId)

          - script: |
              mkdir -p "$(Build.ArtifactStagingDirectory)/docker-image-metadata"
              printf '%s\n' "$(dockerRepository):$(Build.BuildId)" > "$(Build.ArtifactStagingDirectory)/docker-image-metadata/image-reference.txt"
            displayName: Write image metadata

          - task: PublishPipelineArtifact@1
            displayName: Publish image metadata artifact
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/docker-image-metadata
              artifact: docker-image-metadata
              publishLocation: pipeline
